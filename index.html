<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uttarakhand IDY Wall 2026</title>
<meta name="theme-color" content="#0A1A0C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IDY Wall">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Cinzel:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --saffron:#E8610A;--saffron-light:#FF8C38;--saffron-glow:rgba(232,97,10,0.11);
  --green:#1A5C35;--cream:#FBF5EB;--dark:#0D1A0F;
  --text-primary:#1C1C1C;--text-secondary:#6B6B6B;--border:rgba(232,97,10,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text-primary);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 80% 10%,rgba(232,97,10,0.05) 0%,transparent 50%),radial-gradient(circle at 10% 80%,rgba(26,92,53,0.06) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* HEADER */
.header{position:relative;z-index:10;background:linear-gradient(160deg,#0A1A0C 0%,#0F2010 35%,#1A0E00 100%);overflow:hidden;}
.header-geo{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(232,97,10,0.08) 0%,transparent 45%),radial-gradient(circle at 80% 50%,rgba(26,92,53,0.12) 0%,transparent 45%);pointer-events:none;}
.header-top{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:20px 28px;}
.header-flag{display:flex;flex-direction:column;gap:2px;width:28px;}
.flag-s{height:4px;border-radius:2px;background:#FF6B00;}
.flag-w{height:4px;border-radius:2px;background:rgba(255,255,255,0.88);}
.flag-g{height:4px;border-radius:2px;background:#138808;}
.header-right{display:flex;align-items:center;gap:10px;}
.login-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.75);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.25s;font-family:'DM Sans',sans-serif;}
.login-btn:hover{background:rgba(232,97,10,0.2);border-color:var(--saffron);color:#fff;}
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:100px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.7);font-weight:500;}
.user-pill .dot{width:7px;height:7px;background:#4ADE80;border-radius:50%;}
.upload-fab{display:flex;align-items:center;gap:7px;background:var(--saffron);border:none;border-radius:100px;padding:10px 20px;font-size:13px;font-weight:600;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;box-shadow:0 4px 16px rgba(232,97,10,0.4);}
.upload-fab:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,97,10,0.5);}
.logout-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:100px;padding:9px 14px;font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.logout-btn:hover{color:rgba(255,255,255,0.8);}
.header-body{position:relative;z-index:5;text-align:center;padding:8px 24px 44px;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(232,97,10,0.15);border:1px solid rgba(232,97,10,0.25);border-radius:100px;padding:6px 16px;margin-bottom:20px;animation:fadeDown 0.5s ease both;}
.eyebrow .pulse{width:6px;height:6px;background:var(--saffron-light);border-radius:50%;animation:pulse 2s infinite;}
.eyebrow span{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--saffron-light);}
.h-title{font-family:'Cinzel',serif;font-size:clamp(30px,5.5vw,58px);font-weight:900;color:#fff;line-height:1.05;letter-spacing:-1px;animation:fadeDown 0.6s ease both;}
.h-title .cs{color:var(--saffron-light);}.h-title .cg{color:#6EE7A0;}
.h-deva{font-family:'Tiro Devanagari Hindi',serif;font-size:clamp(13px,1.8vw,16px);color:rgba(255,255,255,0.48);margin-top:10px;animation:fadeDown 0.7s ease both;}
.h-rule{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--saffron),transparent);margin:18px auto;animation:fadeDown 0.75s ease both;}
.stats-row{display:flex;gap:0;justify-content:center;flex-wrap:wrap;animation:fadeDown 0.85s ease both;}
.stat-cell{display:flex;flex-direction:column;align-items:center;padding:0 24px;border-right:1px solid rgba(255,255,255,0.07);}
.stat-cell:last-child{border-right:none;}
.stat-n{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--saffron-light);line-height:1;}
.stat-l{font-size:10px;color:rgba(255,255,255,0.38);letter-spacing:1.8px;text-transform:uppercase;margin-top:5px;}

/* FILTER */

.filter-bar{position:sticky;top:0;z-index:50;background:rgba(251,245,235,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 16px;}
.filter-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:10px;}
.dd-wrap{position:relative;}
.dd-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:100px;
  border:1.5px solid rgba(0,0,0,0.1);background:#fff;
  font-size:13px;font-weight:500;color:var(--text-primary);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.18s;white-space:nowrap;
}
.dd-btn:hover{border-color:var(--saffron);}
.dd-btn.active{background:var(--saffron);border-color:var(--saffron);color:#fff;font-weight:600;}
.dd-btn .dd-count{
  background:rgba(0,0,0,0.08);color:inherit;
  border-radius:100px;padding:1px 7px;font-size:11px;font-weight:700;
}
.dd-btn.active .dd-count{background:rgba(255,255,255,0.25);}
.dd-btn .dd-arrow{font-size:10px;opacity:0.6;transition:transform 0.2s;}
.dd-btn.open .dd-arrow{transform:rotate(180deg);}
.dd-menu{
  position:absolute;top:calc(100% + 6px);left:0;
  background:#fff;border:1px solid rgba(0,0,0,0.08);
  border-radius:14px;padding:6px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);
  z-index:200;min-width:180px;
  animation:scaleIn 0.15s ease;
  transform-origin:top left;
}
.dd-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--text-primary);
  cursor:pointer;transition:background 0.15s;gap:8px;
  border:none;background:none;width:100%;text-align:left;
  font-family:'DM Sans',sans-serif;
}
.dd-item:hover{background:rgba(232,97,10,0.06);}
.dd-item.selected{color:var(--saffron);font-weight:600;background:rgba(232,97,10,0.06);}
.dd-item .dd-item-count{
  font-size:11px;color:var(--text-secondary);
  background:rgba(0,0,0,0.05);border-radius:100px;
  padding:1px 7px;font-weight:600;flex-shrink:0;
}
.dd-item.selected .dd-item-count{background:rgba(232,97,10,0.12);color:var(--saffron);}
.dd-check{color:var(--saffron);font-size:14px;flex-shrink:0;}


/* MAIN */
.main{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:16px 8px 80px;}
@media(min-width:600px){.main{padding:24px 14px 80px;}}
.masonry{columns:2 160px;column-gap:10px;}
@media(min-width:600px){.masonry{columns:3 180px;column-gap:12px;}}
@media(min-width:1024px){.masonry{columns:4 240px;column-gap:14px;}}

/* Compact cards on mobile */
@media(max-width:599px){
  .card{border-radius:12px;margin-bottom:10px;}
  .card-body{padding:10px 12px 4px;}
  .card-event{font-size:12.5px;margin-bottom:4px;}
  .card-desc{font-size:11px;-webkit-line-clamp:2;}
  .card-meta{gap:3px;margin-bottom:7px;}
  .meta-row{font-size:10.5px;}
  .dist-badge{font-size:9.5px;padding:2px 8px;}
  .card-footer{padding:7px 12px 10px;}
  .footer-date{font-size:10px;}
  .play-circle{width:40px;height:40px;}
  .play-circle svg{width:16px;height:16px;}
  .type-pill{font-size:9.5px;padding:3px 8px;}
}

/* CARD */
.card{break-inside:avoid;display:block;background:#fff;border-radius:16px;overflow:hidden;margin-bottom:14px;border:1px solid rgba(0,0,0,0.05);box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform 0.3s ease,box-shadow 0.3s ease;animation:cardIn 0.4s ease both;}
.card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.13);}
.card-media{position:relative;width:100%;overflow:hidden;background:#EDE0CC;cursor:pointer;}
.card-media img{width:100%;height:auto;display:block;transition:transform 0.4s ease;}
.card:hover .card-media img{transform:scale(1.04);}
.type-pill{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:10.5px;font-weight:700;backdrop-filter:blur(6px);}
.pp{background:rgba(232,97,10,0.88);color:#fff;}
.pv{background:rgba(185,28,28,0.88);color:#fff;}
.py{background:rgba(185,28,28,0.92);color:#fff;}
.pn{background:rgba(30,64,175,0.88);color:#fff;}
.play-over{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.22);transition:background 0.25s;cursor:pointer;}
.card:hover .play-over{background:rgba(0,0,0,0.38);}
.play-circle{width:52px;height:52px;background:rgba(255,255,255,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.play-circle svg{width:20px;height:20px;fill:var(--saffron);margin-left:3px;}
.vid-ph{background:linear-gradient(135deg,#1a1a1a,#2d1500);min-height:160px;display:flex;align-items:center;justify-content:center;}
.card-body{padding:14px 16px 6px;}
.card-event{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.4;margin-bottom:7px;}
.card-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-meta{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.meta-row{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-secondary);}
.meta-row svg{width:11px;height:11px;flex-shrink:0;opacity:0.55;}
.dist-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10.5px;font-weight:600;}
.card-footer{padding:9px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(0,0,0,0.04);}
.footer-date{font-size:10.5px;color:rgba(0,0,0,0.3);font-weight:500;}
.footer-paper{font-size:11px;color:#1E40AF;font-weight:600;}

.d-dehradun{background:#FEF3C7;color:#92400E;}.d-haridwar{background:#FEE2E2;color:#991B1B;}
.d-nainital{background:#DBEAFE;color:#1E40AF;}.d-almora{background:#D1FAE5;color:#065F46;}
.d-pauri{background:#EDE9FE;color:#5B21B6;}.d-tehri{background:#CFFAFE;color:#155E75;}
.d-chamoli{background:#FCE7F3;color:#9D174D;}.d-uttarkashi{background:#FEF9C3;color:#713F12;}
.d-pithoragarh{background:#E0F2FE;color:#0C4A6E;}.d-bageshwar{background:#F0FDF4;color:#14532D;}
.d-champawat{background:#FFF7ED;color:#7C2D12;}.d-udham{background:#F5F3FF;color:#4C1D95;}
.d-rudraprayag{background:#ECFDF5;color:#064E3B;}.d-def{background:#F3F4F6;color:#374151;}

.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:0.35;}
.empty-title{font-family:'Cinzel',serif;font-size:18px;color:var(--text-secondary);margin-bottom:6px;}
.empty-sub{font-size:13px;color:rgba(0,0,0,0.3);}
.loading{text-align:center;padding:80px 20px;}
.spinner{width:38px;height:38px;border:3px solid rgba(232,97,10,0.12);border-top-color:var(--saffron);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 14px;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(5,10,6,0.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(5px);animation:fadeIn 0.18s ease;}
.modal{background:#fff;border-radius:20px;width:100%;max-height:92vh;overflow-y:auto;position:relative;animation:scaleIn 0.25s ease;}
.modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;background:rgba(0,0,0,0.06);border:none;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);z-index:5;}
.modal-close:hover{background:rgba(0,0,0,0.12);}
.login-body{padding:44px 36px;text-align:center;max-width:420px;}
.login-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--saffron-glow),rgba(26,92,53,0.1));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;}
.login-title{font-family:'Cinzel',serif;font-size:21px;font-weight:700;color:var(--dark);margin-bottom:5px;}
.login-sub{font-size:12.5px;color:var(--text-secondary);margin-bottom:28px;}
.upload-header{padding:26px 28px 20px;border-bottom:1px solid rgba(0,0,0,0.06);}
.upload-title{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:var(--dark);}
.upload-sub{font-size:12px;color:var(--text-secondary);margin-top:4px;}
.upload-body{padding:22px 28px 28px;}
.fg{margin-bottom:15px;}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px;}
.fi{width:100%;padding:11px 14px;border:1.5px solid rgba(0,0,0,0.09);border-radius:10px;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--text-primary);transition:border-color 0.18s;background:#FAFAFA;}
.fi:focus{outline:none;border-color:var(--saffron);background:#fff;}
.fsel{width:100%;padding:11px 14px;border:1.5px solid rgba(0,0,0,0.09);border-radius:10px;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--text-primary);background:#FAFAFA;appearance:none;cursor:pointer;}
.fsel:focus{outline:none;border-color:var(--saffron);}
.fta{width:100%;padding:11px 14px;border:1.5px solid rgba(0,0,0,0.09);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-primary);resize:vertical;min-height:75px;background:#FAFAFA;}
.fta:focus{outline:none;border-color:var(--saffron);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.err{font-size:11px;color:#DC2626;margin-top:4px;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.t-opt{border:1.5px solid rgba(0,0,0,0.08);border-radius:11px;padding:11px 6px;text-align:center;cursor:pointer;transition:all 0.18s;background:#fff;}
.t-opt:hover{border-color:var(--saffron);}
.t-opt.sel{border-color:var(--saffron);background:var(--saffron-glow);}
.t-icon{font-size:21px;margin-bottom:4px;}
.t-name{font-size:10.5px;font-weight:600;color:var(--text-secondary);}
.t-opt.sel .t-name{color:var(--saffron);}
.up-area{border:2px dashed rgba(232,97,10,0.28);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--saffron-glow);position:relative;}
.up-area:hover{border-color:var(--saffron);}
.up-area input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.up-icon{font-size:28px;margin-bottom:7px;}
.up-text{font-size:12.5px;color:var(--text-secondary);}
.up-text strong{color:var(--saffron);}
.up-preview{margin-top:10px;font-size:12px;color:var(--green);font-weight:600;}
.prog-wrap{margin-top:14px;}
.prog-label{font-size:12px;color:var(--text-secondary);margin-bottom:5px;}
.prog-outer{height:5px;background:rgba(0,0,0,0.07);border-radius:100px;overflow:hidden;}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--saffron),var(--green));border-radius:100px;transition:width 0.3s ease;}
.sec-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--saffron);margin:18px 0 12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(232,97,10,0.12);}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--saffron),#C04F00);color:#fff;border:none;border-radius:11px;font-size:14.5px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.25s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(232,97,10,0.32);}
.btn-p:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-s{width:100%;padding:11px;background:transparent;color:var(--text-secondary);border:1.5px solid rgba(0,0,0,0.09);border-radius:11px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.18s;margin-top:7px;}
.btn-s:hover{border-color:var(--saffron);color:var(--saffron);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.18s ease;}
.lb-inner{max-width:960px;width:100%;animation:scaleIn 0.25s ease;}
.lb-inner img{width:100%;height:auto;border-radius:12px;max-height:72vh;object-fit:contain;}
.lb-inner video{width:100%;border-radius:12px;max-height:72vh;}
.lb-inner iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;}
.lb-cap{color:rgba(255,255,255,0.6);text-align:center;margin-top:14px;font-size:13px;}
.lb-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,0.08);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-close:hover{background:rgba(255,255,255,0.15);}

.toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:500;z-index:9999;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,0.28);animation:slideUp 0.28s ease;max-width:320px;}
.toast.ok{border-left:3px solid #22C55E;}.toast.er{border-left:3px solid #EF4444;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.75);}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* YOGA UPLOAD OVERLAY */
.yoga-overlay{
  position:fixed;inset:0;
  background:linear-gradient(135deg,rgba(10,26,12,0.97),rgba(26,14,0,0.97));
  z-index:5000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  animation:fadeIn 0.3s ease;
}
.yoga-pose-wrap{
  position:relative;
  width:200px;height:200px;
  margin-bottom:32px;
}
.yoga-figure{
  font-size:120px;
  line-height:1;
  animation:yogaPose 1.2s ease-in-out infinite alternate;
  display:block;
  text-align:center;
  filter:drop-shadow(0 0 30px rgba(232,97,10,0.5));
}
.yoga-ring{
  position:absolute;
  inset:-20px;
  border:2px solid rgba(232,97,10,0.2);
  border-radius:50%;
  animation:ringPulse 2s ease infinite;
}
.yoga-ring-2{
  position:absolute;
  inset:-40px;
  border:1.5px solid rgba(232,97,10,0.1);
  border-radius:50%;

async function uploadCloudinary(file,onPct){
  return new Promise((res,rej)=>{
    const fd=new FormData();
    fd.append('file',file);fd.append('upload_preset',UPLOAD_PRESET);fd.append('folder','idy2026');
    const xhr=new XMLHttpRequest();
    xhr.open('POST',CL_URL);
    xhr.upload.onprogress=e=>{if(e.lengthComputable)onPct(Math.round(e.loaded/e.total*85));};
    xhr.onload=()=>{
      if(xhr.status===200){
        const r=JSON.parse(xhr.responseText);
        const thumb=r.resource_type==='video'
          ?r.secure_url.replace('/upload/','/upload/w_640,h_360,c_fill,so_2,f_jpg/').replace(/\.(mp4|mov|avi|webm)$/i,'.jpg')
          :r.secure_url;
        res({url:r.secure_url,thumb});
      }else{
        let errMsg='Cloudinary error '+xhr.status;
        try{ const er=JSON.parse(xhr.responseText); errMsg=er.error?.message||errMsg; }catch(e){}
        rej(new Error(errMsg));
      }
    };
    xhr.onerror=()=>rej(new Error('Network error'));
    xhr.send(fd);
  });
}

function ytId(url){const m=url.match(/(?:youtu\.be\/|v=|embed\/)([^&?/]+)/);return m?m[1]:null;}

async function submitEntry(){
  const e={};
  if(!S.uEvent.trim())e.ev='Event name required';
  if(!S.uLocation.trim())e.loc='Location required';
  if(!S.uDistrict)e.dist='Select district';
  if(!S.uDate)e.date='Date required';
  const needsFile = S.uType!=='youtube' && !(S.uType==='news' && S.uNewsType==='link');
  if(needsFile && !S.uFile)e.file='Select a file';
  if(S.uType==='news' && S.uNewsType==='link' && !(S.uNewsUrl||'').trim())e.newsUrl='News URL required';
  if(S.uType==='youtube'&&!S.uYoutube.trim())e.yt='YouTube URL required';
  if(S.uType==='news'&&!S.uNewspaper.trim())e.paper='Newspaper name required';
  if(Object.keys(e).length){set({uErrors:e});return;}
  mut({uploading:true,pct:5,uErrors:{}});
  // Close upload modal first, then show yoga overlay
  set({showUpload:false});
  await new Promise(r=>setTimeout(r,100));
  const yogaDiv = document.createElement('div');
  yogaDiv.id = 'yogaContainer';
  yogaDiv.innerHTML = rYogaOverlay();
  document.body.appendChild(yogaDiv);
  startYogaAnimation();
  try{
    let mediaUrl=null,thumbUrl=null;
    if(S.uType==='youtube'){
      mediaUrl=S.uYoutube.trim();
      const id=ytId(mediaUrl);
      thumbUrl=id?`https://img.youtube.com/vi/${id}/hqdefault.jpg`:null;
      mut({pct:90});updateYogaProgress(90);
    }else if(S.uType==='news' && S.uNewsType==='link'){
      mediaUrl=(S.uNewsUrl||'').trim();
      mut({pct:30});updateYogaProgress(30);
      try{
        // Try microlink for OG image
        const ogRes = await fetch('https://api.microlink.io/?url='+encodeURIComponent(mediaUrl));
        const ogData = await ogRes.json();
        if(ogData.status==='success'){
          thumbUrl = ogData.data?.image?.url || ogData.data?.logo?.url || null;
          if(!S.uDesc.trim() && ogData.data?.description) S.uDesc = ogData.data.description.slice(0,200);
        }
        // Fallback: use screenshot
        if(!thumbUrl){
          thumbUrl = 'https://api.microlink.io/?url='+encodeURIComponent(mediaUrl)+'&screenshot=true&meta=false&embed=screenshot.url';
        }
      }catch(e){ thumbUrl=null; }
      mut({pct:90});updateYogaProgress(90);
    }else{
      if(!S.uFile) throw new Error('No file selected. Please select a file first.');
      const r=await uploadCloudinary(S.uFile,p=>{mut({pct:p});updateYogaProgress(p);});
      mediaUrl=r.url;thumbUrl=r.thumb;mut({pct:92});updateYogaProgress(92);
    }
    const entry={
      type:S.uType,event_name:S.uEvent.trim(),location:S.uLocation.trim(),
      district:S.uDistrict,event_date:S.uDate,description:S.uDesc.trim()||null,
      newspaper_name:S.uType==='news'?S.uNewspaper.trim():null,
      news_type:S.uType==='news'?S.uNewsType:null,
      media_url:mediaUrl,thumbnail_url:thumbUrl,
      uploaded_by:(S.appUser?.name||S.appUser?.mobile||'unknown'),created_at:new Date().toISOString()
    };
    const{data:ins,error}=await sb.from('idy_entries').insert([entry]).select();
    if(error)throw new Error('DB: '+error.message);
    mut({pct:100});updateYogaProgress(100);
    await new Promise(r=>setTimeout(r,900));
    stopYogaAnimation();
    const yc=document.getElementById('yogaContainer');
    if(yc){
      yc.style.transition='opacity 0.4s ease';
      yc.style.opacity='0';
      await new Promise(r=>setTimeout(r,400));
      yc.remove();
    }
    Object.assign(S,{uploading:false,pct:0,showUpload:false,uFile:null,uFileName:'',uEvent:'',uLocation:'',uDistrict:'',uDate:tod(),uDesc:'',uNewspaper:'',uYoutube:'',uNewsType:'cutting',uNewsUrl:'',uType:'photo'});
    render();
    showToast('✅ Uploaded to IDY Wall!','ok');
    loadEntries();
  }catch(err){
    stopYogaAnimation();
    const yce=document.getElementById('yogaContainer');
    if(yce){ yce.style.opacity='0'; yce.style.transition='opacity 0.3s'; setTimeout(()=>yce.remove(),300); }
    set({uploading:false,pct:0});
    showToast('Upload failed: '+err.message,'er');
  }
}


async function fetchOGPreview(url){
  try{
    const res = await fetch('https://api.microlink.io/?url='+encodeURIComponent(url));
    const data = await res.json();
    if(data.status==='success'){
      return {
        title: data.data?.title||'',
        image: data.data?.image?.url||data.data?.screenshot?.url||'',
        description: data.data?.description||''
      };
    }
  }catch(e){ console.log('OG fetch failed',e); }
  return {title:'',image:'',description:''};
}


function fallbackCopy(text, btn){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{
    document.execCommand('copy');
    if(btn){ btn.textContent='✅ Copied!'; setTimeout(()=>{ btn.textContent='📋 Copy Credentials'; },2500); }
  }catch(e){ alert('Copy failed. Text:\n'+text); }
  document.body.removeChild(ta);
}

function initScrollObserver(){
  const cards=document.querySelectorAll('.card');
  if(!cards.length) return;
  const io=new IntersectionObserver((entries)=>{
    let delay=0;
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const d=delay;
        setTimeout(()=>entry.target.classList.add('visible'), d);
        delay+=50;
        io.unobserve(entry.target);
      }
    });
  },{threshold:0.05,rootMargin:'0px 0px -30px 0px'});
  cards.forEach(c=>io.observe(c));
}

function rCard(e){
  const pill={photo:'pp',video:'pv',youtube:'py',news:'pn'};
  const plab={photo:'📷 Photo',video:'🎥 Video',youtube:'▶️ YouTube',news:'📰 News'};
  const isNewsLink = e.type==='news' && e.news_type==='link';
  let med='';

  if(e.type==='photo' || (e.type==='news' && !isNewsLink)){
    med='<div class="card-media">'
      +'<img src="'+(e.media_url||'')+'" alt="'+(e.event_name||'')+'" loading="lazy"/>'
      +'<div class="type-pill '+(pill[e.type]||'pp')+'">'+(plab[e.type]||'')+'</div>'
      +'</div>';
  } else if(isNewsLink){
    const nn = e.newspaper_name||'News Article';
    const hasThumb = e.thumbnail_url && e.thumbnail_url.startsWith('http');
    med='<div class="card-media" style="min-height:120px">'
      +(hasThumb
        ?'<img src="'+e.thumbnail_url+'" alt="'+nn+'" loading="lazy" style="width:100%;height:auto;display:block;"/>'
        :'<div style="background:linear-gradient(135deg,#EFF6FF,#DBEAFE);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px">'
          +'<div style="font-size:32px">&#128240;</div>'
          +'<div style="font-size:10px;font-weight:700;color:#1E40AF;text-align:center">'+nn+'</div>'
          +'<div style="font-size:10px;color:white;background:#1E40AF;padding:3px 10px;border-radius:100px">&#128279; Web Link</div>'
          +'</div>')
      +'<div class="type-pill pn">&#128240; News</div>'
      +'</div>';
  } else if(e.type==='youtube'){
    const id=ytId(e.media_url||'');
    const th=id?'https://img.youtube.com/vi/'+id+'/hqdefault.jpg':'';
    med='<div class="card-media">'
      +(th?'<img src="'+th+'" alt="'+(e.event_name||'')+'" loading="lazy"/>':'<div class="vid-ph"></div>')
      +'<div class="play-over"><div class="play-circle"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div>'
      +'<div class="type-pill py">&#9654;&#65039; YouTube</div>'
      +'</div>';
  } else if(e.type==='video'){
    const vt=e.thumbnail_url||'';
    med='<div class="card-media">'
      +(vt?'<img src="'+vt+'" alt="'+(e.event_name||'')+'" loading="lazy" style="width:100%;height:auto;display:block;"/>':'<div class="vid-ph"></div>')
      +'<div class="play-over"><div class="play-circle"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div>'
      +'<div class="type-pill pv">&#127909;&#65039; Video</div>'
      +'</div>';
  } else {
    med='<div class="card-media"><div class="vid-ph"></div></div>';
  }

  const isSA=S.appUser?.role==='super_admin';
  const pinBtn=isSA
    ?'<button class="pin-btn '+(e.is_pinned?'pinned':'')+'" data-pin-id="'+e.id+'" data-pin-val="'+(e.is_pinned?'true':'false')+'">'+(e.is_pinned?'&#128204;':'&#128205;')+'</button>'
    :'';

  const dateShort = e.event_date ? new Date(e.event_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
  return '<div class="card '+(e.is_pinned?'card-pinned':'')+'" data-detail-id="'+e.id+'">'
    +med
    +'<div class="card-info-strip">'
    +'<div class="strip-left">'
    +'<div class="strip-title">'+(e.event_name||'')+'</div>'
    +'<div class="strip-meta">&#128205; '+(e.location||'')+' &nbsp;·&nbsp; <span class="dist-badge '+dc(e.district)+'">'+(e.district||'')+'</span></div>'

    +'</div>';

function rLightbox(){
  const lb=S.lightbox;let c='';
  if(lb.type==='img')c=`<img src="${lb.url}" alt="${lb.cap||''}"/><div class="lb-cap">${lb.cap||''}</div>`;
  else if(lb.type==='yt'){const id=ytId(lb.url);c=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;}
  else if(lb.type==='vid')c=`<video src="${lb.url}" controls autoplay></video>`;
  return`<div class="lightbox" id="lbOverlay"><button class="lb-close" id="lbClose">✕</button><div class="lb-inner">${c}</div></div>`;
}


function cleanMobile(v){
  v=v.replace(/\s/g,'');
  v=v.replace(/[()\-]/g,'');
  v=v.replace(/^\+91/,'');
  v=v.replace(/^91(\d{10})$/,'$1');
  v=v.replace(/^\+/,'');
  v=v.replace(/\D/g,'');
  v=v.replace(/^0+/,'');
  return v.slice(0,10);
}
function attachMobileInput(el, setter){
  if(!el) return;
  el.addEventListener('paste', ev=>{
    ev.preventDefault();
    const pasted = (ev.clipboardData||window.clipboardData).getData('text');
    const clean = cleanMobile(pasted);
    el.value = clean;
    setter(clean);
  });
  el.addEventListener('input', ev=>{
    const clean = cleanMobile(ev.target.value);
    if(ev.target.value !== clean){ el.value = clean; }
    setter(clean);
  });
}

<script>
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  const s=document.getElementById('installStrip'); if(s) s.style.display='flex';
});
window.addEventListener('appinstalled', function(){
  deferredPrompt = null;
  const s2=document.getElementById('installStrip'); if(s2) s2.style.display='none';
});
function setupInstallBtn(){
  const strip = document.getElementById('installStrip');
  if(!strip) return;
  if(deferredPrompt) strip.style.display='flex';
  strip.onclick = function(){
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      if(r.outcome==='accepted'){ deferredPrompt=null; strip.style.display='none'; }
    });
  };
}
</script>
